[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Collect logs from all Docker containers on the host
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Tag               docker.*

# Collect host system journal logs
[INPUT]
    Name              systemd
    Tag               host.systemd
    Systemd_Filter    _SYSTEMD_UNIT=docker.service
    Read_From_Tail    On
    Strip_Underscores On

# Self-monitoring: FluentBit internal metrics as logs
[INPUT]
    Name          fluentbit_metrics
    Tag           fb.metrics
    Scrape_Interval 15

# Parse JSON payloads from Docker containers
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       docker
    Reserve_Data On
    Preserve_Key On

# Enrich every record with hostname and environment label
[FILTER]
    Name   record_modifier
    Match  *
    Record hostname    ${HOSTNAME}
    Record environment ${ENVIRONMENT}

# Ship everything to VictoriaLogs via its Elasticsearch-compatible ingest API
[OUTPUT]
    Name                es
    Match               *
    Host                victorialogs
    Port                9428
    Path                /insert/elasticsearch/
    Index               fluent-bit
    # VictoriaLogs field mapping
    # _msg_field  → the field that becomes the log message body
    # _time_field → the field used as the log timestamp
    # _stream_fields → fields used to identify a log stream
    Header              VL-Msg-Field    message
    Header              VL-Time-Field   @timestamp
    Header              VL-Stream-Fields  hostname,container_name,environment,level,service
    Suppress_Type_Name  On
    tls                 Off
    Retry_Limit         5
    Trace_Error         On