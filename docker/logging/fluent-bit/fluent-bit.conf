[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Collect logs from all Docker containers on the host
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Tag               docker.*

# Collect host system journal logs
[INPUT]
    Name              systemd
    Tag               host.systemd
    Systemd_Filter    _SYSTEMD_UNIT=docker.service
    Read_From_Tail    On
    Strip_Underscores On

# Self-monitoring: FluentBit internal metrics as logs
[INPUT]
    Name          fluentbit_metrics
    Tag           fb.metrics
    Scrape_Interval 15

# Parse JSON payloads from Docker containers
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       docker
    Reserve_Data On
    Preserve_Key On

# Enrich every record with hostname and environment label
[FILTER]
    Name   record_modifier
    Match  *
    Record hostname    ${HOSTNAME}
    Record environment ${ENVIRONMENT}

# Ship everything to VictoriaLogs via its JSON lines ingest API
[OUTPUT]
    Name                http
    Match               *
    Host                victorialogs
    Port                9428
    URI                 /insert/jsonline/
    Format              json_lines
    json_date_key       _time
    json_date_format    iso8601
    # VictoriaLogs field mapping
    # VL-Msg-Field     → the field that becomes the log message body
    # VL-Stream-Fields → fields used to identify a log stream
    Header              VL-Msg-Field       message
    Header              VL-Stream-Fields   hostname,container_name,environment,level,service
    Retry_Limit         5
    Trace_Error         On