[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Collect logs from all Docker containers on the host
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Tag               docker.*

# Collect host system journal logs
[INPUT]
    Name              systemd
    Tag               host.systemd
    Systemd_Filter    _SYSTEMD_UNIT=docker.service
    Read_From_Tail    On
    Strip_Underscores On

# Self-monitoring: FluentBit internal metrics as logs
[INPUT]
    Name          fluentbit_metrics
    Tag           fb.metrics
    Scrape_Interval 15

# Parse JSON payloads from Docker containers
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       docker
    Reserve_Data On
    Preserve_Key On

# Enrich every record with hostname and environment label
[FILTER]
    Name   record_modifier
    Match  *
    Record hostname    ${HOSTNAME}
    Record environment ${ENVIRONMENT}

# Ship everything to VictoriaLogs via its Loki-compatible ingest API
[OUTPUT]
    Name                loki
    Match               *
    Host                victorialogs
    Port                9428
    URI                 /insert/loki/api/v1/push
    Labels              job=hub-adapter
    label_keys          hostname,environment,level,service,container_name
    Line_Format         json
    auto_kubernetes_labels off
    Retry_Limit         5