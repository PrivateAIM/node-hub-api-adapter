[project]
authors = [
    { name = "Bruce Schultz", email = "bruce.schultz@uk-koeln.de" },
]
license = { text = "Apache 2.0" }
requires-python = "<4.0,>=3.11"
dependencies = [
    "uvicorn<1.0.0,>=0.32.0",
    "fastapi<1.0.0,>=0.115.2",
    "async-timeout<6.0.0,>=5.0.1",
    "kubernetes<32.0.0,>=31.0.0",
    "click<9.0.0,>=8.1.7",
    "python-multipart<1.0.0,>=0.0.19",
    "httpx<1.0.0,>=0.28.0",
    "kongadminclient @ git+https://github.com/PrivateAIM/kong-admin-python-client.git",
    "python-dotenv<2.0.0,>=1.0.1",
    "python-jose<4.0.0,>=3.4.0",
]
name = "hub-adapter"
version = "0.2.0"
description = "API gateway interface for the Node UI to interact with the other node services and the hub."
readme = "README.md"

[project.scripts]
hub-adapter = "hub_adapter.cli:main"

[dependency-groups]
dev = [
    "pytest<8.0.0,>=7.4.3",
    "ruff<1.0.0,>=0.1.8",
    "pre-commit<4.0.0,>=3.6.0",
]

[tool.pdm.build]
includes = ["hub_adapter"]

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
